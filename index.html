<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>RPSAI — Rock·Paper·Scissors vs AI | rpsai.io</title>
<meta name="description" content="Play real-time Rock–Paper–Scissors against an AI with your webcam. Retro 90s pixel style, global & national rankings, 10 languages. Free at rpsai.io." />
<meta name="theme-color" content="#008080" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='88'%3E%E2%9C%8A%3C/text%3E%3C/svg%3E" />
<link rel="manifest" href="manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<meta name="apple-mobile-web-app-title" content="RPSAI" />
<!-- Open Graph / 社交预览 -->
<meta property="og:type" content="website" />
<meta property="og:url" content="https://rpsai.io/" />
<meta property="og:title" content="RPSAI — Rock·Paper·Scissors vs AI" />
<meta property="og:description" content="Real-time webcam Rock–Paper–Scissors vs AI. Retro pixel style, global rankings, 10 languages. Free." />
<meta property="og:image" content="https://rpsai.io/og.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="RPSAI — Rock·Paper·Scissors vs AI" />
<meta name="twitter:description" content="Real-time webcam Rock–Paper–Scissors vs AI. Retro pixel style, global rankings." />
<meta name="twitter:image" content="https://rpsai.io/og.png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
  :root{
    --teal:#008080; --gray:#c0c0c0; --dk:#808080; --lt:#fff; --sh:#000;
    --navy:#000080; --navy2:#1084d0; --win:#008000; --lose:#c00000; --tie:#a000a0; --txt:#000;
    --pix:'Press Start 2P',monospace;
    --body:'VT323','Courier New',"PingFang SC","Microsoft YaHei",monospace;
    --raise:inset -1px -1px 0 #000,inset 1px 1px 0 #fff,inset -2px -2px 0 var(--dk),inset 2px 2px 0 #dfdfdf;
    --sink:inset 1px 1px 0 var(--dk),inset -1px -1px 0 #fff,inset 2px 2px 0 #000,inset -2px -2px 0 #dfdfdf;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--teal);color:var(--txt);
    font-family:var(--body);font-size:20px;overscroll-behavior:none;image-rendering:pixelated}
  #app{display:flex;flex-direction:column;height:100dvh;max-width:560px;margin:0 auto;
    background:var(--gray);box-shadow:var(--raise);padding:3px}

  /* 窗口标题栏 */
  .titlebar{display:flex;align-items:center;gap:6px;background:linear-gradient(90deg,var(--navy),var(--navy2));
    color:#fff;font-family:var(--pix);font-size:9px;padding:4px 4px;margin-bottom:3px}
  .titlebar .tt{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:1px}
  .titlebar .wbtn{width:18px;height:16px;background:var(--gray);box-shadow:var(--raise);color:#000;
    font-family:var(--pix);font-size:8px;display:flex;align-items:center;justify-content:center}

  .topbar{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:5px 4px 0}
  .topbar .login{flex:1;justify-content:center;max-width:60%}
  header{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:5px 4px;flex-wrap:wrap}
  header h1{font-family:var(--pix);font-size:10px;margin:0;white-space:nowrap;color:#000}
  .right{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  .score{display:flex;gap:8px;align-items:center}
  .score>div{background:#000;box-shadow:var(--sink);padding:2px 7px;color:#0f0;font-size:22px;line-height:1}
  .score b{font-size:22px}
  .you>div{color:#3af} .ai>div{color:#f55}
  select#lang{font-family:var(--body);font-size:17px;background:#fff;color:#000;border:0;
    box-shadow:var(--sink);padding:4px 4px;border-radius:0;max-width:44%}
  @media (max-width:400px){
    header h1{font-size:9px}
    .score>div{font-size:18px;padding:2px 5px}
    .score b{font-size:18px}
    .iconbtn{padding:5px 6px;font-size:14px}
  }

  .stage{position:relative;flex:1;overflow:hidden;background:#000;box-shadow:var(--sink);margin:2px}
  video,canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
  canvas{z-index:2}
  .stage::after{content:'';position:absolute;inset:0;z-index:3;pointer-events:none;
    background:repeating-linear-gradient(rgba(0,0,0,.18) 0 1px,transparent 1px 3px)}
  #fx{z-index:7;pointer-events:none}
  .stage.shake{animation:shake .4s steps(2) both}
  @keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(-6px,3px)}
    40%{transform:translate(6px,-3px)}60%{transform:translate(-5px,-3px)}80%{transform:translate(5px,3px)}}
  .flash{position:absolute;inset:0;z-index:6;pointer-events:none;opacity:0;background:#fff}
  .flash.go{animation:flash .3s ease-out}
  @keyframes flash{from{opacity:.7}to{opacity:0}}
  /* 连胜徽章 */
  .combo{position:absolute;top:96px;left:50%;transform:translateX(-50%);z-index:8;
    font-family:var(--pix);font-size:16px;color:#ff0;display:none;
    background:rgba(0,0,0,.55);padding:6px 12px;box-shadow:var(--raise);white-space:nowrap;
    text-shadow:2px 2px 0 #c00000}
  .combo.on{display:block;animation:cbump .25s steps(2)}
  @keyframes cbump{from{transform:translateX(-50%) scale(1.5)}to{transform:translateX(-50%) scale(1)}}
  /* 连胜大字 */
  .comboword{position:absolute;top:44%;left:50%;transform:translate(-50%,-50%);z-index:8;
    font-family:var(--pix);font-size:34px;color:#fff;text-align:center;pointer-events:none;
    opacity:0;white-space:nowrap}
  /* 👍 READY 就绪反馈 */
  .ready{position:absolute;inset:0;z-index:8;display:none;flex-direction:column;align-items:center;
    justify-content:center;pointer-events:none;text-align:center;gap:14px}
  .ready.on{display:flex}
  .ready .rface{font-size:120px;line-height:1;animation:rpulse .5s ease-in-out infinite alternate;
    filter:drop-shadow(4px 4px 0 rgba(0,0,0,.5))}
  .ready .rtxt{font-family:var(--pix);font-size:48px;color:#ffde00;text-shadow:4px 4px 0 #000,0 0 20px #ff0}
  .ready .rbar{width:62%;height:22px;background:#fff;box-shadow:var(--sink);padding:2px}
  .ready .rbar>i{display:block;height:100%;width:0%;
    background:repeating-linear-gradient(90deg,#0f0 0 8px,#0a0 8px 10px)}
  @keyframes rpulse{from{transform:scale(1)}to{transform:scale(1.14)}}
  .comboword.go{animation:cword 1s ease-out}
  @keyframes cword{0%{opacity:0;transform:translate(-50%,-50%) scale(.3) rotate(-8deg)}
    25%{opacity:1;transform:translate(-50%,-50%) scale(1.15) rotate(3deg)}
    70%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0)}
    100%{opacity:0;transform:translate(-50%,-90%) scale(1)}}

  .ai-hand{position:absolute;top:10px;left:10px;z-index:4;font-size:48px;
    background:var(--gray);box-shadow:var(--raise);width:76px;height:76px;
    display:flex;align-items:center;justify-content:center}
  .ai-hand small{position:absolute;bottom:-18px;left:0;width:100%;text-align:center;
    font-family:var(--pix);font-size:8px;color:#fff;text-shadow:1px 1px 0 #000}
  .you-hand{position:absolute;top:10px;right:10px;z-index:4;background:var(--gray);box-shadow:var(--raise);
    padding:8px 12px;font-size:30px;min-width:56px;text-align:center}

  .center{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;
    align-items:center;justify-content:center;pointer-events:none;text-align:center}
  .count{font-family:var(--pix);font-size:40px;color:#ff0;
    text-shadow:3px 3px 0 #000,-3px 3px 0 #000;animation:pop .25s steps(3)}
  .result{font-family:var(--pix);font-size:18px;line-height:1.5;padding:14px 20px;
    background:var(--gray);box-shadow:var(--raise);animation:pop .2s steps(3)}
  .result.win{color:var(--win)} .result.lose{color:var(--lose)} .result.tie{color:var(--tie)}
  @keyframes pop{from{transform:scale(.5)}to{transform:scale(1)}}
  @keyframes blink{50%{opacity:0}}

  .status{position:absolute;bottom:0;left:0;width:100%;z-index:4;text-align:center;
    padding:5px;font-size:18px;color:#000;background:var(--gray);box-shadow:var(--raise)}

  .maskbar{position:absolute;bottom:40px;left:0;width:100%;z-index:4;display:flex;justify-content:center;gap:6px}
  .chip{background:var(--gray);box-shadow:var(--raise);color:#000;padding:6px 12px;
    font-family:var(--pix);font-size:9px;cursor:pointer;user-select:none}
  .chip:active,.chip.on{box-shadow:var(--sink)}
  .chip.on{background:#ffde00}
  .meter{position:absolute;top:100px;left:10px;z-index:4;background:#000;box-shadow:var(--sink);
    color:#0f0;font-family:var(--pix);font-size:9px;padding:5px 7px;line-height:1.4}
  html[dir="rtl"] .meter{left:auto;right:10px}
  .seal{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:4;max-width:88%;
    background:#000;box-shadow:var(--sink);color:#0ff;font-family:var(--pix);font-size:8px;
    padding:5px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .seal.ok{color:#0f0}

  footer{padding:3px 4px}
  button.play{width:100%;padding:9px;border:0;font-family:var(--pix);font-size:13px;color:#000;
    background:var(--gray);box-shadow:var(--raise);cursor:pointer;letter-spacing:1px}
  button.play:active{box-shadow:var(--sink)}
  button.play:disabled{color:var(--dk)}
  button.play .pk{font-size:18px;opacity:.7}
  .hint{text-align:center;color:#004000;font-size:14px;margin-top:3px;line-height:1.15}
  .counter{text-align:center;font-family:var(--pix);font-size:8px;color:#000;margin-top:3px}
  .counter b{background:#000;color:#0f0;padding:2px 5px;letter-spacing:2px}
  .counter .nw{color:var(--lose);animation:blink 1s steps(1) infinite}
  .counter .live{color:#0f0;animation:blink 1.4s steps(1) infinite}

  .loader{position:absolute;inset:0;z-index:6;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:14px;background:var(--teal);font-family:var(--pix);font-size:10px;color:#fff}
  .spin{width:26px;height:26px;background:var(--gray);box-shadow:var(--raise);animation:r 1s steps(8) infinite}
  @keyframes r{to{transform:rotate(360deg)}}
  html[dir="rtl"] .ai-hand{left:auto;right:10px}
  html[dir="rtl"] .you-hand{right:auto;left:10px}

  .iconbtn{background:var(--gray);box-shadow:var(--raise);color:#000;padding:5px 7px;
    font-size:15px;cursor:pointer;display:flex;align-items:center;gap:4px;border:0}
  .iconbtn:active{box-shadow:var(--sink)}
  .iconbtn b{max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    font-family:var(--pix);font-size:8px;font-weight:400}

  .modal{position:fixed;inset:0;z-index:20;background:rgba(0,0,0,.45);
    display:none;align-items:center;justify-content:center;padding:16px}
  .modal.show{display:flex}
  .sheet{width:100%;max-width:400px;background:var(--gray);box-shadow:var(--raise);padding:3px;max-height:84dvh;overflow:auto}
  .sheet h2{margin:0 0 12px;font-family:var(--pix);font-size:10px;color:#fff;
    background:linear-gradient(90deg,var(--navy),var(--navy2));padding:5px 6px;
    display:flex;align-items:center;justify-content:space-between}
  .sheet .body{padding:14px}
  .sheet h2 .x{cursor:pointer;background:var(--gray);box-shadow:var(--raise);color:#000;
    width:18px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px}
  .sheet input{width:100%;padding:8px;border:0;box-shadow:var(--sink);background:#fff;color:#000;
    font-family:var(--body);font-size:19px;margin-bottom:10px}
  .sheet .g,.sheet .primary{width:100%;padding:11px;border:0;box-shadow:var(--raise);background:var(--gray);
    color:#000;font-family:var(--pix);font-size:10px;cursor:pointer;margin-bottom:10px;
    display:flex;align-items:center;justify-content:center;gap:8px}
  .sheet .g:active,.sheet .primary:active{box-shadow:var(--sink)}
  .or{text-align:center;color:var(--dk);font-size:16px;margin:4px 0}
  #lbList{background:#fff;box-shadow:var(--sink);padding:3px;margin-bottom:4px}
  .lbrow{display:flex;align-items:center;gap:8px;padding:6px 5px;border-bottom:1px solid #c0c0c0}
  .lbrow .rk{width:26px;text-align:center;font-family:var(--pix);font-size:11px;color:#000}
  .lbrow.me{background:var(--navy);color:#fff}
  .lbrow.me .nm,.lbrow.me .st{color:#fff}
  .lbrow .av{font-size:24px}
  .lbrow .nm{flex:1;font-size:20px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lbrow .st{text-align:right;font-size:15px;color:#333;line-height:1.3}
  .lbrow .st b{color:var(--win);font-family:var(--pix);font-size:11px}
  .lbrow.me .st b{color:#0f0}
  .tip{color:#000;font-size:15px;text-align:center;margin-top:8px;line-height:1.3}
  .tabs{display:flex;gap:4px;margin-bottom:10px}
  .tab{flex:1;background:var(--gray);box-shadow:var(--raise);border:0;color:#000;
    font-family:var(--pix);font-size:9px;padding:8px 4px;cursor:pointer}
  .tab.on{box-shadow:var(--sink);background:#dcdcdc}
  .myrank{background:var(--navy);color:#fff;box-shadow:var(--raise);padding:8px 10px;margin-bottom:8px;
    font-size:17px;display:flex;align-items:center;justify-content:space-between;gap:8px;min-height:20px}
  .myrank b{font-family:var(--pix);font-size:11px;color:#ff0}
  .fld{display:block;font-family:var(--pix);font-size:8px;color:#000;margin:0 0 6px;letter-spacing:1px}
  /* 心理分析 */
  .iqbox{background:#000;box-shadow:var(--sink);color:#0f0;text-align:center;padding:10px;margin-bottom:12px;
    font-family:var(--pix);font-size:12px}
  .iqbox b{font-size:26px;color:#ff0;display:inline-block;margin:0 4px}
  .iqbox i{color:#f80;font-style:normal;font-size:9px}
  .iqbox .iqh{font-family:var(--body);font-size:15px;color:#7cf;margin-top:8px;line-height:1.3}
  .arch{background:var(--navy);color:#fff;box-shadow:var(--raise);padding:14px;text-align:center;margin-bottom:12px}
  .arch .face{font-size:64px;line-height:1}
  .arch .anm{font-family:var(--pix);font-size:15px;color:#ff0;margin:8px 0 4px}
  .arch .atag{font-size:17px;color:#7cf}
  .arch .adesc{font-size:17px;color:#fff;margin-top:8px;line-height:1.35;text-align:left}
  .metric{margin-bottom:9px}
  .metric .ml{display:flex;justify-content:space-between;font-size:15px;margin-bottom:3px}
  .metric .ml b{font-family:var(--pix);font-size:10px}
  .bar{height:16px;background:#fff;box-shadow:var(--sink);padding:2px}
  .bar>i{display:block;height:100%;background:repeating-linear-gradient(90deg,var(--navy2) 0 8px,var(--navy) 8px 10px)}
  .bar.rk>i{background:repeating-linear-gradient(90deg,#c00 0 8px,#800 8px 10px)}
  .bar.pp>i{background:repeating-linear-gradient(90deg,#0a0 0 8px,#080 8px 10px)}
  .bar.sc>i{background:repeating-linear-gradient(90deg,#fb0 0 8px,#d90 8px 10px)}
  .psytell{background:#fff;box-shadow:var(--sink);padding:8px 10px;font-size:16px;margin:10px 0;line-height:1.35}
  .ptypes{background:#fff;box-shadow:var(--sink);padding:3px;margin-top:6px}
  .ptype{display:flex;align-items:center;gap:8px;padding:7px 6px;border-bottom:1px solid #c0c0c0}
  .ptype:last-child{border-bottom:0}
  .ptype .pf{font-size:26px;width:32px;text-align:center;flex-shrink:0}
  .ptype .pt{font-size:15px;line-height:1.3}
  .ptype .pt b{font-family:var(--pix);font-size:9px;display:block;margin-bottom:2px}
  .ptype.on{background:var(--navy);color:#fff}
  .ptype.on .pt b{color:#ff0}
  .psyneed{text-align:center;font-size:18px;padding:20px 10px;line-height:1.5}
  .cardwrap{box-shadow:var(--sink);background:#000;padding:3px;margin-bottom:10px}
  .cardwrap img{display:block;width:100%;image-rendering:pixelated}
</style>
</head>
<body>
<div id="app">
  <div class="titlebar">
    <span class="tt">RPSAI.EXE — ✊✌️🖐️</span>
    <span class="wbtn">_</span><span class="wbtn">□</span><span class="wbtn">✕</span>
  </div>
  <div class="topbar">
    <select id="lang" aria-label="language"></select>
    <button class="iconbtn login" id="userBtn"><span id="userIcon">👤</span><b id="userName" data-t="login">登录</b></button>
  </div>
  <header>
    <h1><span data-t="title">✊✌️🖐️ RPSAI</span></h1>
    <div class="right">
      <div class="score">
        <div class="you"><span data-t="you">你</span> <b id="sYou">0</b></div>
        <div class="ai"><span data-t="ai">AI</span> <b id="sAi">0</b></div>
      </div>
      <button class="iconbtn" id="psyBtn" title="psychology">🧠</button>
      <button class="iconbtn" id="shareBtn" title="share">📷</button>
      <button class="iconbtn" id="lbBtn" title="leaderboard">🏆</button>
    </div>
  </header>

  <div class="stage">
    <video id="video" playsinline muted></video>
    <canvas id="canvas"></canvas>
    <canvas id="fx"></canvas>
    <div class="combo" id="combo"></div>
    <div class="comboword" id="comboWord"></div>
    <div class="flash" id="flash"></div>
    <div class="ai-hand" id="aiHand">🤖<small data-t="ai">AI</small></div>
    <div class="you-hand" id="youHand">—</div>
    <div class="meter" id="aiMeter" style="display:none"></div>
    <div class="seal" id="seal" style="display:none"></div>
    <div class="center" id="center"></div>
    <div class="ready" id="ready">
      <div class="rface">👍</div>
      <div class="rtxt">READY</div>
      <div class="rbar"><i></i></div>
    </div>
    <div class="maskbar" id="maskbar" style="display:none">
      <div class="chip" id="maskToggle" data-t="mask">面具</div>
      <div class="chip" id="maskShuffle">🎲</div>
      <div class="chip" id="aiToggle" title="mind-reader AI">🧠</div>
    </div>
    <div class="status" id="status" data-t="statusInit">点击下方按钮，把手伸到镜头前</div>
    <div class="loader" id="loader"><div class="spin"></div><div data-t="loading">正在加载模型…</div></div>
  </div>

  <footer>
    <button class="play" id="playBtn" disabled><span data-t="start">开始一局</span><span class="pk"> / 👍</span></button>
    <div class="hint" data-t="hint">在喊"布"的瞬间，把 ✊/✌️/🖐️ 对准镜头</div>
    <div class="counter"><span class="live">● LIVE</span> <span data-t="online">在线人数</span> <b id="visits">0000000</b></div>
  </footer>
</div>

<!-- 登录弹窗 -->
<div class="modal" id="loginModal">
  <div class="sheet">
    <h2><span data-t="loginTitle">登录看全球排名</span><span class="x" data-close>✕</span></h2>
    <div class="body">
      <input id="emailInput" type="email" placeholder="you@email.com" />
      <button class="primary" id="emailBtn" data-t="emailBtn">发送登录链接</button>
      <div class="tip" id="loginTip" data-t="loginTip">免密码：点邮件里的链接即可登录</div>
    </div>
  </div>
</div>

<!-- 排行榜弹窗 -->
<div class="modal" id="lbModal">
  <div class="sheet">
    <h2><span>🏆 <span data-t="rank">全球排名</span></span><span class="x" data-close>✕</span></h2>
    <div class="body">
      <div class="tabs">
        <button class="tab on" data-scope="global">🌍 <span data-t="global">全球</span></button>
        <button class="tab" data-scope="nation">🏴 <span data-t="nation">本国</span></button>
      </div>
      <div id="myRank" class="myrank"></div>
      <div id="lbList"></div>
      <div class="tip" data-t="rankTip">按 局数 + 胜率（Wilson 置信下限）排序 · Top 100</div>
    </div>
  </div>
</div>

<!-- 单窗口锁（防多开刷分） -->
<div class="modal" id="lockModal">
  <div class="sheet">
    <h2><span>⏸ <span data-t="lockTitle">已暂停</span></span></h2>

/* ---------------- DOM ---------------- */
const video=document.getElementById('video'), canvas=document.getElementById('canvas'),
  ctx=canvas.getContext('2d'), center=document.getElementById('center'),
  statusEl=document.getElementById('status'), playBtn=document.getElementById('playBtn'),
  loader=document.getElementById('loader'), aiHand=document.getElementById('aiHand'),
  youHand=document.getElementById('youHand'), sYou=document.getElementById('sYou'),
  sAi=document.getElementById('sAi'), maskbar=document.getElementById('maskbar'),
  maskToggle=document.getElementById('maskToggle'), maskShuffle=document.getElementById('maskShuffle'),
  aiToggle=document.getElementById('aiToggle'), aiMeter=document.getElementById('aiMeter'),
  sealEl=document.getElementById('seal'),
  readyEl=document.getElementById('ready'), readyBar=document.querySelector('#ready .rbar>i');

const EMOJI={rock:'✊',scissors:'✌️',paper:'🖐️'};
let hands, face, running=false, lastGesture=null, scoreYou=0, scoreAi=0, streak=0;
let history=[]; try{ history=JSON.parse(localStorage.getItem('rps_history')||'[]'); }catch(e){}
let mindReader=false, predHits=0, predN=0, aiGuess=null, thumbSince=0;

/* 面具 */
const MASKS=['🦊','🐱','🐶','🐼','🐨','🐵','🦁','🐯','🤡','👽','🤖','🎃','😎','🥸','🐸','🐰'];
let maskOn=false, maskIdx=0, lastFace=null, frame=0;

/* ---------------- 加载模型 ---------------- */
async function init(){
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
  hands = await HandLandmarker.createFromOptions(vision,{
    baseOptions:{modelAssetPath:"https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",delegate:"GPU"},
    runningMode:"VIDEO", numHands:1 });
  face = await FaceLandmarker.createFromOptions(vision,{
    baseOptions:{modelAssetPath:"https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",delegate:"GPU"},
    runningMode:"VIDEO", numFaces:1 });
  loader.style.display='none'; playBtn.disabled=false;
}

/* ---------------- 摄像头 ---------------- */
async function startCamera(){
  const stream=await navigator.mediaDevices.getUserMedia({
    video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}},audio:false});
  video.srcObject=stream; await video.play();
  // iOS/后台：视频被暂停时自动恢复，防止卡住
  video.addEventListener('pause', ()=>{ if(running) video.play().catch(()=>{}); });
  document.addEventListener('visibilitychange', ()=>{ if(!document.hidden && running) video.play().catch(()=>{}); });
  canvas.width=video.videoWidth; canvas.height=video.videoHeight;
  running=true; maskbar.style.display='flex'; sizeFx(); requestAnimationFrame(loop);
}

/* ---------------- 主循环 ---------------- */
function loop(){
  if(!running) return;
  requestAnimationFrame(loop);          // 先排下一帧：任何异常都不会中断循环
  frame++;
  try{
  if(video.readyState>=2){
    const now=performance.now();
    const res=hands.detectForVideo(video, now);
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // 面具：每 2 帧检测一次脸，省性能
    if(maskOn){
      if(frame%2===0){ const f=face.detectForVideo(video, now+0.5);
        lastFace=(f.faceLandmarks&&f.faceLandmarks.length)?f.faceLandmarks[0]:null; }
      if(lastFace) drawMask(lastFace);
    }

    if(res.landmarks&&res.landmarks.length){
      const lm=res.landmarks[0];
      if(!maskOn) drawHand(lm);
      lastGesture=classify(lm);
      youHand.textContent=lastGesture?EMOJI[lastGesture]:'🤚';
      // 👍 竖大拇指保持约 0.8 秒自动开局（仅空闲时），中央显示大 READY + 进度
      if(!playBtn.disabled && isThumbsUp(lm)){
        youHand.textContent='👍';
        if(!thumbSince) thumbSince=now;
        const held=now-thumbSince;
        if(held>=220){                                   // 起始宽限，滤掉张手过渡瞬间
          const prog=Math.min(1,(held-220)/600);
          readyEl.classList.add('on'); readyBar.style.width=(prog*100)+'%';
          if(prog>=1){ thumbSince=0; readyEl.classList.remove('on'); playRound(); }
        }
      } else { thumbSince=0; readyEl.classList.remove('on'); }
    }else{ lastGesture=null; youHand.textContent='—'; thumbSince=0; readyEl.classList.remove('on'); }
  }
  }catch(e){ /* 单帧异常忽略，下一帧继续 */ }
}

function drawMask(lm){
  let minX=1,minY=1,maxX=0,maxY=0;
  for(const p of lm){ minX=Math.min(minX,p.x);maxX=Math.max(maxX,p.x);
    minY=Math.min(minY,p.y);maxY=Math.max(maxY,p.y); }
  const cx=(minX+maxX)/2*canvas.width, cy=(minY+maxY)/2*canvas.height;
  const h=(maxY-minY)*canvas.height*1.3;
  const eL=lm[33], eR=lm[263];
  const ang=Math.atan2((eR.y-eL.y),(eR.x-eL.x));
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(ang);
  ctx.font=`${h}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(MASKS[maskIdx],0,0); ctx.restore();
}

function drawHand(lm){
  const C=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],
    [9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
  ctx.lineWidth=4; ctx.strokeStyle='rgba(0,210,255,.8)';
  for(const[a,b]of C){ctx.beginPath();
    ctx.moveTo(lm[a].x*canvas.width,lm[a].y*canvas.height);
    ctx.lineTo(lm[b].x*canvas.width,lm[b].y*canvas.height);ctx.stroke();}
  ctx.fillStyle='#fff';
  for(const p of lm){ctx.beginPath();
    ctx.arc(p.x*canvas.width,p.y*canvas.height,4,0,Math.PI*2);ctx.fill();}
}

/* ---------------- 手势分类 ---------------- */
function classify(lm){
  const w=lm[0], d=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
  const up=(tip,pip)=>d(lm[tip],w)>d(lm[pip],w)*1.05;
  const idx=up(8,6),mid=up(12,10),ring=up(16,14),pk=up(20,18);
  const n=[idx,mid,ring,pk].filter(Boolean).length;
  if(n===0)return'rock';
  if(idx&&mid&&!ring&&!pk)return'scissors';
  if(n>=3)return'paper';
  return null;
}
// 👍 竖大拇指：四指明显卷曲 + 拇指伸出且朝上（是最高点）
function isThumbsUp(lm){
  const w=lm[0], d=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
  // 卷曲：指尖比其掌指关节(MCP)更靠近手腕
  const curled=(tip,mcp)=> d(lm[tip],w) < d(lm[mcp],w)*1.15;
  const fingersCurled = curled(8,5)&&curled(12,9)&&curled(16,13)&&curled(20,17);
  const thumbOut = d(lm[4],w) > d(lm[2],w)*1.4;           // 拇指伸出
  // 拇指必须朝上：指尖明显高于拇指根(向上) 且是全手最高点——👎向下、横放、张手都会被排除
  const thumbUp = lm[4].y < lm[2].y-0.05
    && lm[4].y<lm[8].y && lm[4].y<lm[12].y && lm[4].y<lm[16].y && lm[4].y<lm[20].y && lm[4].y<lm[0].y;
  return fingersCurled && thumbOut && thumbUp;
}

function burst(n, cols){ const W=fx.width, cx=W/2, cy=fx.height*0.42;
  for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2, sp=3+Math.random()*7;
    parts.push({x:cx+(Math.random()-.5)*W*0.3, y:cy, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-4,
      s:6+Math.random()*10, c:cols[i%cols.length], life:1}); }
  if(!fxRunning){ fxRunning=true; requestAnimationFrame(fxLoop); } }

function fxLoop(){ fxc.clearRect(0,0,fx.width,fx.height);
  for(const p of parts){ p.vy+=0.35; p.x+=p.vx; p.y+=p.vy; p.life-=0.012;
    fxc.globalAlpha=Math.max(0,p.life); fxc.fillStyle=p.c; fxc.fillRect(p.x|0,p.y|0,p.s,p.s); }
  fxc.globalAlpha=1; parts=parts.filter(p=>p.life>0 && p.y<fx.height+20);
  if(parts.length) requestAnimationFrame(fxLoop); else fxRunning=false; }

function flash(col){ flashEl.style.background=col; flashEl.classList.remove('go');

function beep(s){ try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)();
  const t=actx.currentTime, base=380+Math.min(s,12)*55;
  [[base,t,.18],[base*1.5,t+.08,.2]].forEach(([f,st,d],i)=>{ if(i&&s<3)return;
    const o=actx.createOscillator(),g=actx.createGain(); o.type='square'; o.frequency.value=f;
    g.gain.setValueAtTime(.05,st); g.gain.exponentialRampToValueAtTime(.0001,st+d);
    o.connect(g).connect(actx.destination); o.start(st); o.stop(st+d); }); }catch(e){} }

function judge(y,a){ if(y===a)return'tie';
  if((y==='rock'&&a==='scissors')||(y==='scissors'&&a==='paper')||(y==='paper'&&a==='rock'))return'win';
  return'lose'; }

/* ---------------- 读心 AI（可开关，非无敌） ---------------- */
const BEAT={rock:'paper',paper:'scissors',scissors:'rock'};      // 克制 key 的招
const AGGRO=0.7;                                                 // 读心概率，其余随机 → 打得过
const randMove=()=>['rock','scissors','paper'][Math.floor(Math.random()*3)];
function predictPlayer(){
  const h=history; if(h.length<3) return null;
  const last=h[h.length-1];
  if(last.r==='win')  return last.you;          // 胜留：预测你重复
  if(last.r==='lose') return BEAT[last.you];    // 败变：预测你顺时针换手
  const c={rock:0,paper:0,scissors:0}; h.slice(-12).forEach(x=>c[x.you]++);  // 平局→近期高频
  return Object.keys(c).sort((a,b)=>c[b]-c[a])[0];
}
function chooseAI(){ aiGuess=null;
  if(!mindReader) return randMove();
  const p=predictPlayer();
  if(!p || Math.random()>AGGRO) return randMove();  // 留出破绽
  aiGuess=p; return BEAT[p];                         // 出克制你预测手的招
}
// 可证明公平：AI 出手前先公开哈希封条，揭示时可校验
async function sha256(s){ const b=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join(''); }
function genSalt(){ const a=new Uint8Array(8); crypto.getRandomValues(a);
  return [...a].map(x=>x.toString(16).padStart(2,'0')).join(''); }

async function playRound(){
  if(!tabActive){ showLock(); return; }
  playBtn.disabled=true;
  const seq=['rock','scissors','paper'];
  // ① AI 出手前先落子并公开封条哈希（可证明公平）
  const ai=chooseAI(), salt=genSalt(), seal=await sha256(ai+'|'+salt);
  sealEl.className='seal'; sealEl.style.display='block';
  sealEl.textContent=`🔒 ${t('sealed')} · ${seal.slice(0,12)}`;
  for(let i=0;i<3;i++){
    center.innerHTML=`<div class="count">${t(seq[i])}</div>`;
    aiHand.innerHTML=EMOJI[seq[i]]+`<small>${t('ai')}</small>`;
    await wait(650);
  }
  center.innerHTML='';
  const you=lastGesture;
  aiHand.innerHTML=EMOJI[ai]+`<small>${t('ai')}</small>`;
  // ② 揭示并校验封条 → 证明 AI 没在看到你的手后改招
  const check=await sha256(ai+'|'+salt);
  sealEl.className='seal ok'; sealEl.textContent=`✅ ${t('verified')} · ${check.slice(0,12)}`;
  if(!you){
    statusEl.textContent=t('noSeeS');
    center.innerHTML=`<div class="result tie">${t('noSee')}</div>`;
  }else{
    const r=judge(you,ai);
    if(r==='win'){scoreYou++;sYou.textContent=scoreYou; streak++;
      center.innerHTML=`<div class="result win">${t('win')}</div>`; updateCombo(); streakFx();}
    else if(r==='lose'){scoreAi++;sAi.textContent=scoreAi; streak=0;
      center.innerHTML=`<div class="result lose">${t('lose')}</div>`; updateCombo();}
    else center.innerHTML=`<div class="result tie">${t('tie')}</div>`; // 平局保留连胜
    statusEl.textContent=t('played',{y:`${t(you)} ${EMOJI[you]}`, a:`${t(ai)} ${EMOJI[ai]}`});
    store.record(r);
    history.push({you,ai,r}); if(history.length>300) history.shift();
    localStorage.setItem('rps_history', JSON.stringify(history));
    if(mindReader && aiGuess){ predN++; if(aiGuess===you) predHits++;
      aiMeter.style.display='block';
      aiMeter.innerHTML=`🎯 ${t('read')} ${Math.round(predHits/predN*100)}%`; }
  }
  await wait(1600); center.innerHTML=''; sealEl.style.display='none'; playBtn.disabled=false;
}

function wilson(w, n){ if(!n) return 0; const z=1.96, p=w/n;
  return (p + z*z/(2*n) - z*Math.sqrt((p*(1-p)+z*z/(4*n))/n))/(1+z*z/n); }

async function detectCountry(){ if(_cc) return _cc;
  try{ const r=await fetch('https://ipapi.co/country/'); const c=(await r.text()).trim();
    if(/^[A-Z]{2}$/.test(c)){ _cc=c; return c; } }catch(e){}
  const loc=(navigator.language.split('-')[1]||'US').toUpperCase();
  _cc=/^[A-Z]{2}$/.test(loc)?loc:'US'; return _cc; }
function cc2flag(cc){ if(!cc||cc.length!==2||cc==='XX') return '🏳️';
  return String.fromCodePoint(...[...cc.toUpperCase()].map(c=>0x1F1E6+c.charCodeAt(0)-65)); }
function rankMe(rows){ rows.sort((a,b)=>b.score-a.score||b.decisive-a.decisive);
  rows.forEach((r,i)=>r.rank=i+1);
  const total=rows.length, mine=rows.find(r=>r._me);
  return { rows:rows.slice(0,100), total,
    me: mine?{rank:mine.rank,total,percentile:total>1?Math.round((1-(mine.rank-1)/total)*100):100}:null }; }

function makeSbStore(client){ return {

  user(){ return me; },
  async setCountry(c){ if(me)me.country=c; await client.rpc('set_country',{c}); },
  async setName(n){ if(me&&!me.nameSet&&n){ me.name=n; me.nameSet=true;

  async setWallet(w){ if(me&&w&&!me.walletSet){ me.wallet=w; me.walletSet=true;
    await client.rpc('set_wallet',{addr:w}); } },
  async signInEmail(email){ const {error}=await client.auth.signInWithOtp({email,options:{emailRedirectTo:location.href}});
    return {ok:!error, instant:false, error:error?.message}; },
  async signInGoogle(){ const {error}=await client.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.href}});
    return {ok:!error, error:error?.message}; },
  async signOut(){ await client.auth.signOut(); me=null; },
  async record(r){ if(me){ if(r==='win')me.wins++;else if(r==='lose')me.losses++;else me.ties++; }
    await client.rpc('record_result',{outcome:r}); },
  async leaderboard(scope='global'){
    const view = scope==='nation'?'leaderboard_national':'leaderboard';
    const cc = (me&&me.country)||'XX';
    let q=client.from(view).select('*').order('rank').limit(100);
    if(scope==='nation') q=q.eq('country',cc);

    let mine=null;
    if(sbUserId){

      const {data:md}=await mq.maybeSingle();
      let cq=client.from(view).select('*',{count:'exact',head:true});

      const {count}=await cq;
      if(md) mine={rank:md.rank,total:count||0,percentile:count>1?Math.round((1-(md.rank-1)/count)*100):100};
    }
    return { scope, rows:data||[], total:0, me:mine };
  }
};}

// base58 校验：解码应为 32 字节
function isSolAddress(s){ if(!/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(s)) return false;
  const A='123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz'; let bytes=[0];
  for(const ch of s){ let carry=A.indexOf(ch); if(carry<0) return false;
    for(let j=0;j<bytes.length;j++){ carry+=bytes[j]*58; bytes[j]=carry&0xff; carry>>=8; }
    while(carry){ bytes.push(carry&0xff); carry>>=8; } }
  for(let k=0;k<s.length&&s[k]==='1';k++) bytes.push(0);
  return bytes.length===32; }

function bevel(g,x,y,w,h,raised,fill){ g.fillStyle=fill; g.fillRect(x,y,w,h);

  g.textBaseline='middle'; g.font=`${size}px ${pix?"'Press Start 2P'":"'VT323'"},monospace`; g.fillText(s,x,y); }
function ptext(g,s,x,y,size,color,align){ ctext(g,s,x+4,y+4,size,'#000',true,align); ctext(g,s,x,y,size,color,true,align); }

function drawCard(g,W,H,d){
  g.fillStyle='#008080'; g.fillRect(0,0,W,H);
  bevel(g,40,40,W-80,H-80,true,'#c0c0c0');
  // 标题栏
  const grd=g.createLinearGradient(64,0,W-64,0); grd.addColorStop(0,'#000080'); grd.addColorStop(1,'#1084d0');
  g.fillStyle=grd; g.fillRect(64,64,W-128,72);
  ctext(g,'RPS.EXE — SCORE CARD',88,100,20,'#fff',true,'left');
  bevel(g,W-152,74,52,52,true,'#c0c0c0'); ctext(g,'✕',W-126,102,18,'#000',true,'center');
  // 头像
  ctext(g,d.avatar||'🕹️',W/2,320,190,'#000',false,'center');
  ptext(g,`${cc2flag(d.country)} ${d.name}`.slice(0,26),W/2,470,34,'#fff','center');
  // 三个 LCD 战绩框
  const bw=280,bh=180,gap=30,sx=(W-(bw*3+gap*2))/2,by=540;
  const boxes=[['WIN',d.wins,'#0f0'],['LOSE',d.losses,'#f55'],['DRAW',d.ties,'#ff0']];
  boxes.forEach((b,i)=>{ const x=sx+i*(bw+gap);
    bevel(g,x,by,bw,bh,false,'#000');
    ctext(g,String(b[1]),x+bw/2,by+bh*0.42,72,b[2],true,'center');
    ctext(g,b[0],x+bw/2,by+bh*0.78,34,'#0a0',false,'center'); });
  // 胜率
  const dec=d.wins+d.losses, wr=dec?Math.round(d.wins/dec*100):0;
  ptext(g,`WIN RATE ${wr}%`,W/2,800,44,'#ffde00','center');
  // 排名
  if(d.rank){
    bevel(g,120,872,W-240,168,false,'#101010');
    ptext(g,`GLOBAL RANK #${d.rank}`,W/2,934,40,'#00e0ff','center');
    ctext(g,`BEATS ${d.pct}% OF PLAYERS`,W/2,1000,30,'#0f0',false,'center');
  }else{
    bevel(g,120,872,W-240,168,false,'#101010');
    ptext(g,'★ LOG IN TO RANK ★',W/2,958,30,'#ffde00','center');
  }
  // SOL 持有者徽章（与下方 CTA / 上方排名框同宽对齐）
  if(d.wallet){
    const short=d.wallet.slice(0,4)+'…'+d.wallet.slice(-4), bw=W-240,bx=120,by=1056,bh=52;
    bevel(g,bx,by,bw,bh,false,'#0a0a12');
    ctext(g,`◎ HOLDER  ${short}`,W/2,by+bh/2+2,30,'#b48bff',false,'center');
  }
  // 扫描线（先画，避免盖住下面网址导致看不清）
  g.fillStyle='rgba(0,0,0,0.10)'; for(let y=40;y<H-40;y+=3) g.fillRect(40,y,W-80,1);
  // 页脚 CTA 条：与排名框同宽，MEMECOIN 钩子(金色) + 超大号域名(青色)，深底高对比、清晰 VT323
  const uw=W-240, ux=120, uy=1118, uh=138;
  bevel(g,ux,uy,uw,uh,false,'#08080f');
  ctext(g,'▶ PLAY RPS · WIN MEMECOIN 🪙',W/2,uy+38,34,'#ffd000',false,'center');
  ctext(g,'rpsai.io',W/2,uy+96,80,'#00e0ff',false,'center');
}

async function buildCard(){
  const u=store.user();

              : {name:'GUEST',avatar:(maskOn?MASKS[maskIdx]:'🕹️'),country:_cc,wallet:'',wins:scoreYou,losses:scoreAi,ties:0};

}

/* ================= 玩家心理分析（基于 Wang et al. 2014 胜留败变模型） ================= */
const psyBtn=document.getElementById('psyBtn'), psyModal=document.getElementById('psyModal'), psyBody=document.getElementById('psyBody');

const PSY={
  bruiser:{en:{face:'🗿',name:'THE BRUISER',tag:'Rock-first aggressor',desc:'You lead with Rock far more than chance. Psychology links the fist to aggression and confidence — the default of beginners and alphas alike. Bold, but readable.',tell:'You throw Rock too often. A savvy foe will spam Paper on you.'},
    zh:{face:'🗿',name:'岩石斗士',tag:'石头开局的攻击者',desc:'你出石头的频率远高于随机。心理学把「拳头」与攻击性、支配欲相连——这是新手与「阿尔法」的本能默认。够猛，但也够好读。',tell:'你太爱出石头。老手会疯狂用「布」克制你。'}},
  habit:{en:{face:'🔒',name:'THE LOYALIST',tag:'Win-stay creature of habit',desc:'When you win, you repeat the same move — the classic “win-stay” reflex from Wang’s 2014 study. Comfort in what works, but it hands opponents your pattern.',tell:'After a win you repeat. Opponents play the move that beats your last winner.'},
    zh:{face:'🔒',name:'胜者固守者',tag:'赢了就重复的习惯派',desc:'一旦赢了，你就重复上一手——正是王志坚 2014 研究里经典的「胜留」反射。对有效策略的依赖让你安心，却也交出了规律。',tell:'你赢完会重复。对手只要出能克你上一手的招即可。'}},
  escape:{en:{face:'🌀',name:'THE ESCAPE ARTIST',tag:'Lose-shift, clockwise',desc:'When you lose, you rotate forward Rock→Paper→Scissors — the textbook “lose-shift” cycle. Adaptive and restless, but the direction of your escape is predictable.',tell:'After a loss you shift clockwise. A reader sits one step ahead of you.'},
    zh:{face:'🌀',name:'败者思变者',tag:'输后顺时针求变',desc:'一输你就按 石头→布→剪刀 往前转——教科书式的「败变」循环。善于应变、不甘停留，但你「逃跑」的方向是可预测的。',tell:'你输后会顺时针换手。读心者只要卡在你前一步。'}},
  record:{en:{face:'🔁',name:'THE BROKEN RECORD',tag:'Stubborn repeater',desc:'You repeat the same throw back-to-back far more than most. Persistent and stubborn — you dig in. Great willpower, terrible poker face.',tell:'You repeat moves in a row. Opponents just counter your favorite.'},
    zh:{face:'🔁',name:'复读机',tag:'固执的重复者',desc:'你连续出同一手的频率远超常人。执着、倔强、爱死磕。意志力满分，但底牌全写在脸上。',tell:'你会连续重复。对手克制你的「口头禅」就赢了。'}},
  dodger:{en:{face:'🚫',name:'THE DODGER',tag:'Anti-repetition',desc:'You almost never repeat — actively avoiding your last move. Humans overcorrect trying to “look random”; that avoidance is itself a pattern.',tell:'You rarely repeat. Predict you by ruling out your last throw.'},
    zh:{face:'🚫',name:'回避者',tag:'刻意不重复',desc:'你几乎从不重复，总在躲开上一手。人为了「显得随机」常矫枉过正——这种回避本身就是规律。',tell:'你极少重复。排除你上一手，就能预测你。'}},
  wildcard:{en:{face:'🎲',name:'THE WILDCARD',tag:'Truly unpredictable',desc:'Your throws are near-perfectly random — the rarest and strongest RPS profile. You resist the win-stay/lose-shift reflexes that trap everyone else. Genuinely hard to read.',tell:'No exploitable pattern found. Respect.'},
    zh:{face:'🎲',name:'混沌难测者',tag:'真正的不可预测',desc:'你的出拳近乎完美随机——剪刀石头布里最罕见也最强的画像。你抵住了困住所有人的「胜留败变」反射，真的很难读。',tell:'没找到可利用的规律。佩服。'}},
  balanced:{en:{face:'⚖️',name:'THE GENERALIST',tag:'Balanced & flexible',desc:'No single bias dominates you. You mix throws and outcomes without a strong tell — a solid, adaptable all-rounder. Add more noise and you’ll reach Wildcard.',tell:'Mostly balanced. Watch a slight lean under pressure.'},
    zh:{face:'⚖️',name:'均衡者',tag:'平衡而灵活',desc:'没有哪种偏好主导你。你在出拳与胜负间穿插自如，破绽不明显——扎实、能适应的全能型。再多加点噪声就能进化成「混沌难测者」。',tell:'总体均衡。注意高压下会有轻微偏向。'}},
};
function P(key){ const o=PSY[key]||PSY.balanced; return o[lang]||o.en; }

function analyze(h){ const n=h.length, c={rock:0,paper:0,scissors:0};
  h.forEach(x=>c[x.you]++);
  const pr=c.rock/n, pp=c.paper/n, psc=c.scissors/n;
  const H=-((pr>0?pr*Math.log2(pr):0)+(pp>0?pp*Math.log2(pp):0)+(psc>0?psc*Math.log2(psc):0))/Math.log2(3);
  const cw={rock:'paper',paper:'scissors',scissors:'rock'}; // 顺时针下一手
  let rep=0,trans=0,winPrev=0,winStay=0,losePrev=0,loseShift=0,loseClock=0;
  for(let i=1;i<n;i++){ const p=h[i-1], q=h[i]; trans++;
    if(q.you===p.you) rep++;
    if(p.r==='win'){ winPrev++; if(q.you===p.you) winStay++; }
    if(p.r==='lose'){ losePrev++; if(q.you!==p.you){ loseShift++; if(q.you===cw[p.you]) loseClock++; } } }
  return {n, pct:{rock:pr,paper:pp,scissors:psc}, H, repeatRate:trans?rep/trans:0,
    winPrev, winStayRate:winPrev?winStay/winPrev:0,
    losePrev, loseShiftRate:losePrev?loseShift/losePrev:0, loseClockRate:losePrev?loseClock/losePrev:0 }; }

function iqScore(a){
  const wins=history.filter(h=>h.r==='win').length, wr=wins/a.n;
  let iq=70 + a.H*50 + Math.max(-0.2,(wr-1/3))*100;
  return { iq:Math.max(40,Math.min(160,Math.round(iq))), provisional:a.n<10 };
}

function archetype(a){
  const cand=[
    ['bruiser', a.pct.rock-1/3>0.12 ? (a.pct.rock-1/3)*3 : 0],
    ['habit',   a.winPrev>=3 ? a.winStayRate : 0],
    ['escape',  a.losePrev>=3 ? a.loseClockRate : 0],
    ['record',  a.repeatRate>0.45 ? a.repeatRate : 0],
    ['dodger',  a.repeatRate<0.18 ? (0.28-a.repeatRate)*4 : 0],
  ].sort((x,y)=>y[1]-x[1]);
  if(a.H>=0.93 && cand[0][1]<0.55) return 'wildcard';
  if(cand[0][1]<=0.33) return a.H>=0.85?'wildcard':'balanced';
  return cand[0][0]; }

function renderPsy(){
  if(history.length<8){ const need=Math.max(1,8-history.length);
    psyBody.innerHTML=`<div class="psyneed">🧠<br>${t('psyNeed',{n:need})}
      <div style="margin-top:10px;font-family:var(--pix);font-size:12px;color:#333">${history.length} / 8</div></div>`; return; }
  const a=analyze(history), key=archetype(a), p=P(key), iq=iqScore(a);
  const bar=(cls,label,val)=>`<div class="metric"><div class="ml"><span>${label}</span><b>${Math.round(val*100)}%</b></div>
    <div class="bar ${cls}"><i style="width:${Math.max(2,Math.round(val*100))}%"></i></div></div>`;
  psyBody.innerHTML=`
    <div class="iqbox">${t('psyIQ')} <b>${iq.iq}</b>${iq.provisional?`<i>(${t('provisional')})</i>`:''}
      <div class="iqh">${t('iqHint')}</div></div>
    <div class="arch"><div class="face">${p.face}</div><div class="anm">${p.name}</div>
      <div class="atag">${p.tag}</div><div class="adesc">${p.desc}</div></div>
    <div class="fld">${t('psyThrows')}</div>
    ${bar('rk','✊ '+t('rock'),a.pct.rock)}${bar('pp','🖐️ '+t('paper'),a.pct.paper)}${bar('sc','✌️ '+t('scissors'),a.pct.scissors)}
    <div class="fld" style="margin-top:12px">${t('psyPredict')} 🎲</div>${bar('','',a.H)}
    ${a.winPrev>=3?`<div class="fld" style="margin-top:12px">↩ ${t('psyWinStay')}</div>${bar('','',a.winStayRate)}`:''}
    ${a.losePrev>=3?`<div class="fld" style="margin-top:12px">${t('psyLoseShift')}</div>${bar('','',a.loseClockRate)}`:''}
    <div class="psytell"><b style="font-family:var(--pix);font-size:9px">${t('psyTell')}</b><br>${p.tell}</div>
    <div class="fld" style="margin-top:14px">${t('psyTypes')}</div>
    <div class="ptypes">${['bruiser','habit','escape','record','dodger','wildcard','balanced'].map(k=>{
      const o=P(k); return `<div class="ptype ${k===key?'on':''}"><span class="pf">${o.face}</span>
        <span class="pt"><b>${o.name}</b>${o.tag}</span></div>`; }).join('')}</div>`;
}
psyBtn.addEventListener('click', ()=>{ openModal(psyModal); renderPsy(); });

// 在线人数（7 位数字位，预留到百万级；先滚动到基数再轻微实时跳动）
(function(){ const el=document.getElementById('visits'); if(!el) return;
  let n=parseInt(localStorage.getItem('rps_visits')||'0',10)+1+Math.floor(Math.random()*3);
  localStorage.setItem('rps_visits', n);
  const base = 13370 + n; let cur = Math.max(0, base-40);
  const render=()=>el.textContent=String(Math.max(0,cur)).padStart(7,'0');
  const tick=()=>{ render(); if(cur<base){ cur++; requestAnimationFrame(tick); } else live(); };
  function live(){ setInterval(()=>{ cur += Math.floor(Math.random()*9)-4;
    if(cur<base-25) cur=base-25; render(); }, 4000); }  // ±小幅波动，像实时在线数
  tick();
})();
